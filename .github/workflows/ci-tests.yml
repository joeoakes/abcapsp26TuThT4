name: Maze Project Tests

on:
  push:
    branches: [ main, master ]
    paths:
      # Top-level Python sources live at the repo root (no project_src/ dir).
      - '*.py'
      # Component directories that hold additional source + assets.
      - 'maze/**'
      - 'https/**'
      - 'dashboard/**'
      # Test runners + CI config + dependency manifest.
      - 'test_runners/**'
      - 'requirements.txt'
      - '.github/workflows/ci-tests.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - '*.py'
      - 'maze/**'
      - 'https/**'
      - 'dashboard/**'
      - 'test_runners/**'
      - 'requirements.txt'
      - '.github/workflows/ci-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Test-only deps (not in requirements.txt since they aren't runtime deps).
        pip install fakeredis pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install system dependencies (for C test harnesses)
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libmicrohttpd-dev redis-tools nodejs

    - name: Run all Maze tests
      run: |
        cd "${{ github.workspace }}"
        python test_runners/run_all_tests.py
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: test_runners/*.log
        if-no-files-found: ignore
