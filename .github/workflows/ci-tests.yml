name: Maze Project Tests

on:
  push:
    branches: [ main, master ]
    paths:
      - 'project_src/**'      # Only trigger on source changes (optional optimization)
      - 'test_runners/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'project_src/**'
      - 'test_runners/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'   # Or 3.12 — match what your tests need

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fakeredis pytest  # fakeredis for Redis tests; pytest optional
        # Add other Python deps here if needed (e.g., from requirements.txt)
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Install system dependencies (for C tests)
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc libmicrohttpd-dev  # For libmicrohttpd in HTTPS servers + SDL2 if needed

    - name: Run all Maze tests
      run: |
        cd ${{ github.workspace }}
        python test_runners/run_all_tests.py
      env:
        # Add any env vars your tests need (e.g., for Redis/Mongo mocks)
        PYTHONPATH: ${{ github.workspace }}:{{ github.workspace }}/project_src

    - name: Upload test summary (optional)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: test_runners/*.log   # If your tests generate logs
